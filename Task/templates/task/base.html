<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Task Manager{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: 1px;
        }
        /* Kichik ekranlarda menyular bir-biriga yopishib qolmasligi uchun */
        .nav-link {
            padding-right: 12px !important;
            padding-left: 12px !important;

        }
        .profile{
            transition: 0.2s ease;
        }
        .profile:hover{
            border-bottom: 1px solid yellow;
            border-radius: 5%;
            transform: scale(1.1);
            padding: 1px;
            color: yellow;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a href="{% url 'todo_home' %}" class="navbar-brand me-4">
                <i class="bi bi-check2-square text-warning"></i> TODO PRO
            </a>
            
            <div class="navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a href="{% url 'todo_home' %}" class="nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'task_list' %}">Vazifalar</a>
                    </li>
                </ul>
                
                <div class="d-flex align-items-center text-white">
                    {% if user.is_authenticated %}
                        <span class="me-3 text-light d-flex align-items-center">
                            <a class="text-decoration-none profile" href="{% url 'profile' %}">
                                <i class="bi bi-person-circle me-1"></i> {{ user.username }}
                            </a>    
                        </span>
                        <form action="{% url 'logout' %}" method="post" class="d-inline">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-outline-danger btn-sm">
                                <i class="bi bi-box-arrow-right"></i> Chiqish
                            </button>
                        </form>
                    {% else %}
                        <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm me-2">Kirish</a>
                        <a href="{% url 'register' %}" class="btn btn-warning btn-sm">Ro'yxatdan o'tish</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-3">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button class="btn-close" type="button" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
    </div>

    <main class="container my-4">
        {% block content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
