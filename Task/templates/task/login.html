{% extends 'task/base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow border-0 rounded-3">
            <div class="card-body p-4">
                <h3 class="card-title text-center fw-bold mb-4">
                    <i class="bi bi-box-arrow-in-right text-primary">Kirish</i> 
                </h3>
                
                <form method="post">
                    {% csrf_token %}
                    
                    {% if form.errors %}
                        <div class="alert alert-danger p-2" role="alert">
                            <small>Logingiz yoki parolingiz xato!</small>
                        </div>
                    {% endif %}

                    <div class="mb-3">
                        <label class="form-label text-muted">Foydalanuvchi nomi</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted">Parol</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Kirish</button>
                    <div class="mt-2 text-center">
                        Hisobingiz yo'qmi?
                        <b>
                            <a href="{% url 'register' %}" class="text-decoration-none"> Ro'yxatdan o'tish</a>
                        </b>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
